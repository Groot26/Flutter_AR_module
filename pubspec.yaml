name: ar_demo
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev


version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  ar_flutter_plugin_engine: ^1.0.1
  get: ^4.7.3
  flutter_3d_controller: ^2.3.0
  #  model_viewer_plus: ^1.10.0
  model_viewer_plus: ^1.9.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/models/
    - assets/models/obj/
    - assets/models/obj/car/
    - assets/models/obj/cat/
    - assets/models/obj/avatar/

dependency_overrides:
  permission_handler: ^12.0.1
  permission_handler_android: ^13.0.0